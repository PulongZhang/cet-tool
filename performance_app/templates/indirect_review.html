{% extends "base.html" %}
{% block title %}间接上级审阅 - 绩效考核评分工具{% endblock %}
{% block content %}
<h1>间接上级审阅</h1>
<section class="card">
    <h2>比例分布</h2>
    <p>分布接口：<code>/reviews/indirect/distribution</code></p>
    <table><thead><tr><th>等级</th><th>人数</th></tr></thead><tbody><tr><td>A</td><td>0</td></tr></tbody></table>
</section>
<section class="card">
    <h2>调整与提交</h2>
    <form data-api="/records/{record_id}/adjustments">
        <label>调整字段 <input name="field_name" value="current_subjective_level"></label>
        <label>调整后 <input name="after_value" value="B+"></label>
        <label>原因 <textarea name="reason"></textarea></label>
        <button type="button">保存调整</button>
    </form>
    <form method="post" action="/reviews/indirect/submit" data-api="/reviews/indirect/submit">
        <label>周期 ID <input name="cycle_id" value="1"></label>
        <button type="submit">提交间接上级审阅</button>
    </form>
</section>
{% endblock %}
